basePath: /api/v1
definitions:
  handler.AdminEventResponse:
    properties:
      banner_url:
        type: string
      created_at:
        type: string
      description:
        type: string
      ends_at:
        type: string
      id:
        type: string
      is_online:
        type: boolean
      location:
        type: string
      online_url:
        type: string
      organiser_id:
        type: string
      organiser_name:
        type: string
      slug:
        type: string
      starts_at:
        type: string
      status:
        type: string
      title:
        type: string
      updated_at:
        type: string
      venue:
        type: string
    type: object
  handler.AdminOrderDetailResponse:
    properties:
      checked_in:
        type: boolean
      created_at:
        type: string
      event_id:
        type: string
      event_title:
        type: string
      id:
        type: string
      payment_method:
        type: string
      payment_ref:
        type: string
      quantity:
        type: integer
      status:
        type: string
      user_email:
        type: string
      user_id:
        type: string
      user_name:
        type: string
    type: object
  handler.AdminOrderResponse:
    properties:
      checked_in:
        type: boolean
      created_at:
        type: string
      event_id:
        type: string
      id:
        type: string
      payment_method:
        type: string
      payment_ref:
        type: string
      quantity:
        type: integer
      status:
        type: string
      user_id:
        type: string
    type: object
  handler.AdminStatsResponse:
    properties:
      paid_orders:
        type: integer
      published_events:
        type: integer
      total_attendees:
        type: integer
      total_events:
        type: integer
      total_orders:
        type: integer
      total_organisers:
        type: integer
      total_revenue:
        type: integer
      total_users:
        type: integer
    type: object
  handler.EventCategoryResponse:
    properties:
      created_at:
        type: string
      description:
        type: string
      id:
        type: string
      name:
        type: string
      updated_at:
        type: string
    type: object
  handler.EventResponse:
    properties:
      banner_url:
        type: string
      created_at:
        type: string
      description:
        type: string
      ends_at:
        type: string
      id:
        type: string
      is_online:
        type: boolean
      location:
        type: string
      online_url:
        type: string
      organiser_id:
        type: string
      slug:
        type: string
      starts_at:
        type: string
      status:
        type: string
      title:
        type: string
      updated_at:
        type: string
      venue:
        type: string
    type: object
  handler.OrderResponse:
    properties:
      checked_in:
        type: boolean
      checked_in_at:
        type: string
      created_at:
        type: string
      currency:
        type: string
      event_id:
        type: string
      id:
        type: string
      payment_method:
        type: string
      payment_ref:
        type: string
      qr_code:
        type: string
      quantity:
        type: integer
      status:
        type: string
      ticket_type_id:
        type: string
      total_amount:
        type: number
      unit_price:
        type: number
      updated_at:
        type: string
      user_id:
        type: string
    type: object
  handler.OrderStatusBreakdownResponse:
    properties:
      count:
        type: integer
      status:
        type: string
    type: object
  handler.OrganiserOrderResponse:
    properties:
      checked_in:
        type: boolean
      checked_in_at:
        type: string
      created_at:
        type: string
      event_id:
        type: string
      id:
        type: string
      payment_method:
        type: string
      payment_ref:
        type: string
      quantity:
        type: integer
      status:
        type: string
      ticket_type_id:
        type: string
      user_id:
        type: string
    type: object
  handler.TicketTypeResponse:
    properties:
      created_at:
        type: string
      currency:
        type: string
      description:
        type: string
      event_id:
        type: string
      id:
        type: string
      is_free:
        type: boolean
      name:
        type: string
      price:
        type: integer
      quantity:
        type: integer
      quantity_sold:
        type: integer
      sale_ends:
        type: string
      sale_starts:
        type: string
      updated_at:
        type: string
    type: object
  handler.TicketTypeSalesResponse:
    properties:
      id:
        type: string
      name:
        type: string
      price:
        type: integer
      quantity:
        type: integer
      quantity_sold:
        type: integer
      revenue:
        type: integer
    type: object
  handler.UpdateOrganiserVerificationInput:
    properties:
      is_verified:
        type: boolean
    type: object
  handler.UserResponse:
    properties:
      created_at:
        type: string
      email:
        type: string
      id:
        type: string
      name:
        type: string
      updated_at:
        type: string
    type: object
  handler.authDataResponse:
    properties:
      access_token:
        type: string
      user:
        $ref: '#/definitions/handler.UserResponse'
    type: object
  handler.checkInRequest:
    properties:
      qr_code:
        type: string
    type: object
  response.ErrorDetail:
    properties:
      code:
        type: string
      field:
        type: string
      message:
        type: string
    type: object
  response.ErrorResponse:
    properties:
      error:
        $ref: '#/definitions/response.ErrorDetail'
      success:
        type: boolean
    type: object
  service.CheckInResult:
    properties:
      checked_in:
        type: boolean
      event_id:
        type: string
      message:
        type: string
      order_id:
        type: string
      user_id:
        type: string
    type: object
  service.CreateEventCategoryInput:
    properties:
      description:
        type: string
      name:
        type: string
    required:
    - description
    - name
    type: object
  service.CreateEventInput:
    properties:
      description:
        type: string
      ends_at:
        type: string
      is_online:
        type: boolean
      location:
        type: string
      online_url:
        type: string
      starts_at:
        type: string
      title:
        maxLength: 255
        minLength: 3
        type: string
      venue:
        type: string
    required:
    - ends_at
    - starts_at
    - title
    type: object
  service.CreateTicketTypeInput:
    properties:
      description:
        type: string
      is_free:
        type: boolean
      name:
        maxLength: 100
        minLength: 2
        type: string
      price:
        type: string
      quantity:
        minimum: 1
        type: integer
      sale_ends:
        type: string
      sale_starts:
        type: string
    required:
    - name
    - price
    - quantity
    type: object
  service.ForgotPasswordInput:
    properties:
      email:
        type: string
    required:
    - email
    type: object
  service.InitiatePaymentInput:
    properties:
      event_id:
        type: string
      payment_method:
        enum:
        - MPESA
        - FREE
        type: string
      phone_number:
        type: string
      quantity:
        maximum: 10
        minimum: 1
        type: integer
      ticket_type_id:
        type: string
    required:
    - event_id
    - payment_method
    - phone_number
    - quantity
    - ticket_type_id
    type: object
  service.LoginInput:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  service.MpesaCallback:
    properties:
      Body:
        properties:
          stkCallback:
            properties:
              CallbackMetadata:
                properties:
                  Item:
                    items:
                      properties:
                        Name:
                          type: string
                        Value: {}
                      type: object
                    type: array
                type: object
              CheckoutRequestID:
                type: string
              MerchantRequestID:
                type: string
              ResultCode:
                type: integer
              ResultDesc:
                type: string
            type: object
        type: object
    type: object
  service.PaymentResult:
    properties:
      checkout_request_id:
        type: string
      message:
        type: string
      order_id:
        type: string
    type: object
  service.RegisterInput:
    properties:
      email:
        type: string
      name:
        maxLength: 100
        minLength: 2
        type: string
      password:
        maxLength: 100
        minLength: 8
        type: string
    required:
    - email
    - name
    - password
    type: object
  service.ResetPasswordInput:
    properties:
      new_password:
        maxLength: 100
        minLength: 8
        type: string
      token:
        type: string
    required:
    - new_password
    - token
    type: object
  service.UpdateAvatarInput:
    properties:
      avatarURL:
        type: string
    required:
    - avatarURL
    type: object
  service.UpdateEventCategoryInput:
    properties:
      description:
        type: string
      name:
        type: string
    required:
    - description
    - name
    type: object
  service.UpdateEventInput:
    properties:
      description:
        type: string
      ends_at:
        type: string
      is_online:
        type: boolean
      location:
        type: string
      online_url:
        type: string
      starts_at:
        type: string
      title:
        maxLength: 255
        minLength: 3
        type: string
      venue:
        type: string
    required:
    - ends_at
    - starts_at
    - title
    type: object
  service.UpdateEventStatusInput:
    properties:
      status:
        enum:
        - DRAFT
        - PUBLISHED
        - CANCELLED
        - COMPLETED
        type: string
    required:
    - status
    type: object
  service.UpdatePasswordInput:
    properties:
      currentPassword:
        maxLength: 100
        minLength: 8
        type: string
      newPassword:
        maxLength: 100
        minLength: 8
        type: string
    required:
    - currentPassword
    - newPassword
    type: object
  service.UpdateProfileInput:
    properties:
      email:
        type: string
      name:
        maxLength: 100
        minLength: 2
        type: string
    required:
    - email
    - name
    type: object
  service.UpdateTicketTypeInput:
    properties:
      description:
        type: string
      is_free:
        type: boolean
      name:
        maxLength: 100
        minLength: 2
        type: string
      price:
        type: string
      quantity:
        minimum: 1
        type: integer
      sale_ends:
        type: string
      sale_starts:
        type: string
    required:
    - name
    - price
    - quantity
    type: object
info:
  contact: {}
  description: Event ticketing API
  title: Nafasi API
  version: "1.0"
paths:
  /admin/events:
    get:
      description: Returns paginated list of events (admin only). Optional status
        filter.
      parameters:
      - description: Status (DRAFT, PUBLISHED, CANCELLED, COMPLETED)
        in: query
        name: status
        type: string
      - description: Limit
        in: query
        name: limit
        type: integer
      - description: Offset
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/handler.AdminEventResponse'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get events
      tags:
      - Admin
  /admin/events/{eventID}:
    delete:
      description: Permanently deletes any event (admin only)
      parameters:
      - description: Event ID
        in: path
        name: eventID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete event
      tags:
      - Admin
  /admin/events/{eventID}/cancel:
    patch:
      description: Cancels any event (admin only)
      parameters:
      - description: Event ID
        in: path
        name: eventID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.EventResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Cancel event
      tags:
      - Admin
  /admin/events/categories:
    post:
      description: Creates a new event category (admin only)
      parameters:
      - description: Category payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/service.CreateEventCategoryInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.EventCategoryResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create event category
      tags:
      - Admin
  /admin/events/categories/{categoryID}:
    delete:
      description: Deletes an event category (admin only)
      parameters:
      - description: Category ID
        in: path
        name: categoryID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete event category
      tags:
      - Admin
    patch:
      description: Updates an existing event category (admin only)
      parameters:
      - description: Category ID
        in: path
        name: categoryID
        required: true
        type: string
      - description: Category payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/service.UpdateEventCategoryInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.EventCategoryResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update event category
      tags:
      - Admin
  /admin/orders:
    get:
      description: Returns paginated list of orders filtered by status (admin only)
      parameters:
      - description: Status (PENDING, PAID, FAILED, CANCELLED, REFUNDED)
        in: query
        name: status
        required: true
        type: string
      - description: Limit
        in: query
        name: limit
        type: integer
      - description: Offset
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/handler.AdminOrderResponse'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get orders by status
      tags:
      - Admin
  /admin/orders/recent:
    get:
      description: Returns recent orders with user and event details (admin only)
      parameters:
      - description: Limit
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/handler.AdminOrderDetailResponse'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get recent orders with details
      tags:
      - Admin
  /admin/organisers:
    get:
      description: Returns organisers filtered by approval status (admin only)
      parameters:
      - description: Status (pending, approved)
        in: query
        name: status
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/handler.UserResponse'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get organisers
      tags:
      - Admin
  /admin/stats:
    get:
      description: Returns platform-wide statistics (admin only)
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.AdminStatsResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get platform stats
      tags:
      - Admin
  /admin/users:
    get:
      description: Returns paginated list of users with optional filters (admin only)
      parameters:
      - description: Role (ATTENDEE, ORGANISER, ADMIN)
        in: query
        name: role
        type: string
      - description: Status (ACTIVE, BANNED, DELETED)
        in: query
        name: status
        type: string
      - description: Limit
        in: query
        name: limit
        type: integer
      - description: Offset
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/handler.UserResponse'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get users
      tags:
      - Admin
  /admin/users/{userID}:
    delete:
      description: Permanently deletes a user account (admin only)
      parameters:
      - description: User ID
        in: path
        name: userID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete user
      tags:
      - Admin
    get:
      description: Returns a single user by ID (admin only)
      parameters:
      - description: User ID
        in: path
        name: userID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.UserResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get user by ID
      tags:
      - Admin
  /admin/users/{userID}/ban:
    patch:
      description: Bans a user account (admin only)
      parameters:
      - description: User ID
        in: path
        name: userID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.UserResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Ban user
      tags:
      - Admin
  /admin/users/{userID}/promote:
    patch:
      description: Promotes a user to admin role (admin only)
      parameters:
      - description: User ID
        in: path
        name: userID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
